<!DOCTYPE html>
<html lang="en">

<head>
<title>Health Assistant Chatbot</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>
<main class="app">
<header class="header">
<h1 class="title">Raksha AI Health Assistant</h1>
<p class="subtitle">Ask about symptoms, lab report terms, and which specialist to consult.</p>
<div class="status-row">
<span id="liveStatusBadge" class="status-badge status-ready">Assistant ready</span>
<span id="liveStatusText" class="status-text">Smart health guidance is available now</span>
</div>
</header>

<section id="chatbox" aria-live="polite" aria-label="Chat messages"></section>

<section class="composer">
<button id="fileBtn" class="tool-btn" type="button" aria-label="Upload file" title="Upload file">
<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M16.5 6.5l-7.8 7.8a3 3 0 1 0 4.2 4.2l8.1-8.1a5 5 0 1 0-7.1-7.1L5.7 11.5a7 7 0 0 0 9.9 9.9l6.5-6.5-1.4-1.4-6.5 6.5a5 5 0 0 1-7.1-7.1l8.2-8.2a3 3 0 1 1 4.2 4.2l-8.1 8.1a1 1 0 1 1-1.4-1.4l7.8-7.8z"/></svg>
</button>
<button id="photoBtn" class="tool-btn" type="button" aria-label="Upload photo" title="Upload photo">
<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M9 4l-1.8 2H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-3.2L15 4H9zm3 4.5A5.5 5.5 0 1 1 6.5 14 5.5 5.5 0 0 1 12 8.5zm0 2A3.5 3.5 0 1 0 15.5 14 3.5 3.5 0 0 0 12 10.5z"/></svg>
</button>
<input type="text" id="userInput" placeholder="Type your health question..." autocomplete="off">
<button id="sendBtn" type="button">Send</button>
<input id="fileUploadInput" class="hidden-input" type="file" aria-label="Upload file" title="Upload file">
<input id="photoUploadInput" class="hidden-input" type="file" accept="image/*" aria-label="Upload photo" title="Upload photo">
</section>

<section class="mascot-strip" aria-hidden="true">
<div class="mascot-bot">
<svg viewBox="0 0 120 120" width="64" height="64" focusable="false">
<circle cx="60" cy="60" r="42" fill="#dff8f3"/>
<rect x="28" y="34" width="64" height="46" rx="12" fill="#2fae9f"/>
<rect x="42" y="49" width="12" height="10" rx="4" fill="#ffffff"/>
<rect x="66" y="49" width="12" height="10" rx="4" fill="#ffffff"/>
<rect x="48" y="64" width="24" height="7" rx="3" fill="#0f6d66"/>
<rect x="53" y="23" width="14" height="10" rx="5" fill="#2fae9f"/>
<circle cx="60" cy="21" r="6" fill="#ff9f6a"/>
</svg>
<p>Your friendly care bot</p>
</div>
</section>
</main>

<script src="chatbot.js"></script>

</body>

</html>
